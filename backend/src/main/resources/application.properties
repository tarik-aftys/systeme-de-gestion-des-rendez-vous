# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/appointment_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
jwt.secret=myVeryLongSecretKeyThatIsLongerThan512BitsToMeetJWTRequirementsForHS512AlgorithmAnd1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.appointmentapp=DEBUG
