services:
  postgres:
    image: postgres:16-alpine
    container_name: appointment-postgres
    environment:
      POSTGRES_DB: appointment_app
      POSTGRES_USER: appointment_user
      POSTGRES_PASSWORD: appointment_password
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: appointment-redis
    ports:
      - "6379:6379"

  adminer:
    image: adminer:latest
    container_name: appointment-adminer
    depends_on:
      - postgres
    ports:
      - "8081:8080"

volumes:
  postgres_data:
